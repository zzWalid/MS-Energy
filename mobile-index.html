<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preview Mobile - MS ENERGY</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070a;
      --panel: #0a0f14;
      --phone: #07090c;
      --stroke: #202934;
      --cyan: #00e5ff;
      --text: #f5f7fb;
      --muted: #8b95a3;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 18% 15%, rgba(0, 229, 255, 0.16), transparent 28%),
        radial-gradient(circle at 80% 74%, rgba(0, 255, 170, 0.1), transparent 30%),
        linear-gradient(145deg, #020305, var(--bg));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .preview-shell {
      width: min(100%, 1180px);
      min-height: min(860px, calc(100vh - 48px));
      display: grid;
      grid-template-columns: minmax(320px, 430px) minmax(240px, 1fr);
      align-items: center;
      gap: 44px;
    }

    .phone {
      width: min(390px, calc(100vw - 48px));
      height: min(844px, calc(100vh - 48px));
      min-height: 620px;
      margin-inline: auto;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 42px;
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.12), transparent 18%),
        var(--phone);
      box-shadow:
        0 42px 120px rgba(0, 0, 0, 0.62),
        0 0 0 8px rgba(255, 255, 255, 0.025),
        inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      position: relative;
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 14px;
      left: 50%;
      width: 112px;
      height: 26px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #05070a;
      border: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 2;
    }

    .screen {
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #000;
    }

    iframe {
      width: 390px;
      height: 100%;
      border: 0;
      background: #000;
      display: block;
    }

    .side {
      max-width: 430px;
      padding-block: 20px;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 58px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .side p {
      max-width: 34rem;
      margin: 22px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 26px;
    }

    .pill {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.045);
      color: #d9e3ee;
      font-size: 13px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    .button {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      padding: 0 18px;
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
    }

    .button.primary {
      border-color: transparent;
      background: var(--cyan);
      color: #001014;
      box-shadow: 0 14px 44px rgba(0, 229, 255, 0.28);
    }

    @media (max-width: 820px) {
      body {
        padding: 14px;
      }

      .preview-shell {
        min-height: auto;
        grid-template-columns: 1fr;
        gap: 22px;
      }

      .side {
        order: -1;
        max-width: none;
        padding: 0;
      }

      .side p,
      .actions {
        display: none;
      }

      h1 {
        font-size: 28px;
      }

      .phone {
        width: min(390px, calc(100vw - 28px));
        height: calc(100vh - 150px);
        min-height: 560px;
      }
    }
  </style>
</head>
<body>
  <main class="preview-shell" aria-label="Preview mobile MS ENERGY">
    <section class="phone" aria-label="Emulateur telephone">
      <div class="screen">
        <iframe src="index.html" title="MS ENERGY en format mobile"></iframe>
      </div>
    </section>

    <section class="side" aria-label="Informations de preview">
      <p class="eyebrow">Preview mobile</p>
      <h1>MS ENERGY<br>dans un telephone</h1>
      <p>Cette page charge le site dans un cadre de 390 x 844 px pour visualiser le rendu mobile directement depuis ton navigateur.</p>
      <div class="meta" aria-label="Caracteristiques">
        <span class="pill">390 x 844 px</span>
        <span class="pill">Iframe locale</span>
        <span class="pill">Site statique</span>
      </div>
      <div class="actions">
        <a class="button primary" href="index.html">Ouvrir le site</a>
        <a class="button" href="pc-index.html">Voir PC</a>
        <a class="button" href="mobile-index.html">Recharger la preview</a>
      </div>
    </section>
  </main>
</body>
</html>
