<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preview PC - MS ENERGY</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070a;
      --panel: #080c11;
      --screen: #010203;
      --stroke: #202934;
      --cyan: #00e5ff;
      --text: #f5f7fb;
      --muted: #8b95a3;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        radial-gradient(circle at 18% 12%, rgba(0, 229, 255, 0.14), transparent 26%),
        radial-gradient(circle at 84% 74%, rgba(0, 255, 170, 0.1), transparent 30%),
        linear-gradient(145deg, #020305, var(--bg));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .preview-shell {
      width: min(100%, 1500px);
      display: grid;
      gap: 18px;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 52px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .pill,
    .button {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.045);
      color: #d9e3ee;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }

    .button {
      background: var(--cyan);
      color: #001014;
      border-color: transparent;
      font-weight: 800;
      box-shadow: 0 14px 44px rgba(0, 229, 255, 0.2);
    }

    .desktop {
      height: min(820px, calc(100vh - 150px));
      min-height: 560px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 22px;
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.1), transparent 18%),
        var(--panel);
      box-shadow:
        0 44px 130px rgba(0, 0, 0, 0.58),
        0 0 0 8px rgba(255, 255, 255, 0.025),
        inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .screen {
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      background: var(--screen);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    @media (max-width: 760px) {
      body {
        padding: 14px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .meta {
        justify-content: flex-start;
      }

      .desktop {
        height: calc(100vh - 190px);
        min-height: 480px;
      }
    }
  </style>
</head>
<body>
  <main class="preview-shell" aria-label="Preview PC MS ENERGY">
    <section class="topbar" aria-label="Informations de preview">
      <div>
        <p class="eyebrow">Preview desktop</p>
        <h1>MS ENERGY<br>version PC</h1>
      </div>
      <div class="meta" aria-label="Caracteristiques">
        <span class="pill">1440 px+</span>
        <span class="pill">Iframe locale</span>
        <a class="button" href="mobile-index.html">Voir mobile</a>
      </div>
    </section>

    <section class="desktop" aria-label="Cadre ordinateur">
      <div class="screen">
        <iframe src="index.html" title="MS ENERGY en format desktop"></iframe>
      </div>
    </section>
  </main>
</body>
</html>
